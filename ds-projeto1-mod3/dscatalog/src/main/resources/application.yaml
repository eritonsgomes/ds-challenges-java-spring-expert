server:
  port: 8081

spring:
  application:
    name: dscatalog

  profiles:
    active: test

  jpa:
    defer-datasource-initialization: false
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

security:
  client-id: ${CLIENT_ID:dscatalog}
  client-secret: ${CLIENT_SECRET:123456}
  jwt:
    duration: ${JWT_DURATION:86400}

cors:
  origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    root: info
    org.springframework.web: error
    org.hibernate: error
    org.springframework.security: error
