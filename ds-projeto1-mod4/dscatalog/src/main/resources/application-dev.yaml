spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/dscatalog
    username: postgres
    password: 123456

  jpa:
    defer-datasource-initialization: true
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        hbm2ddl:
          #delimiter:
        format_sql: true
      lob:
        non_contextual_creation: true
      jakarta:
        persistence:
          schema-generation:
            #create-source: metadata
            scripts:
              #action: create
              #create-target: create.sql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
